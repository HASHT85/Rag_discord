services:
  # Force rebuild: v1.0.4
  discord-rag-bot:
    build: .
    container_name: discord-rag-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Persister les logs sur l'hôte
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
