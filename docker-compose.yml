services:
  discord-rag-bot:
    build: .
    container_name: discord-rag-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Persister les données ChromaDB
      - chroma_data:/app/chroma_db
      # Persister les logs sur l'hôte
      - ./logs:/app/logs
      # Persister la configuration des salons (channels)
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  chroma_data:
