services:
  discord-rag-bot:
    build: .
    container_name: discord-rag-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Clé de compte de service Firebase (obligatoire pour Firestore)
      - ./serviceAccountKey.json:/app/serviceAccountKey.json
      # Persister les logs sur l'hôte
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
